<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>気分診断 本レコメンド</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: #f5f5fb;
      --white: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; min-height: 100vh; padding: 0 20px 48px; }
    .screen.active { display: flex; animation: fadeUp .22s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);  }
    }

    /* ── TOP ── */
    .top-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 60px 0 40px;
    }
    .top-icon { font-size: 68px; margin-bottom: 20px; animation: bob 3s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    .top-title { font-size: 28px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 10px; }
    .top-sub { font-size: 15px; color: var(--muted); line-height: 1.65; margin-bottom: 36px; }
    .steps { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
    .step {
      background: var(--white); border-radius: 14px;
      padding: 13px 16px; display: flex; align-items: center; gap: 14px;
      font-size: 14px; color: var(--muted);
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .step-icon { font-size: 22px; }

    /* ── Buttons ── */
    .btn-main {
      width: 100%; background: var(--primary); color: #fff; border: none;
      border-radius: 16px; padding: 18px; font-size: 17px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,.38);
      transition: background .15s, transform .1s;
    }
    .btn-main:hover { background: var(--primary-dark); }
    .btn-main:active { transform: scale(.97); }

    .btn-sub {
      width: 100%; background: var(--white); color: var(--muted);
      border: 1.5px solid var(--border); border-radius: 16px;
      padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-sub:hover { background: #f9fafb; }
    .btn-sub:active { transform: scale(.97); }

    /* ── Screen header ── */
    .s-head { padding-top: 44px; margin-bottom: 28px; }
    .s-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.6px; color: var(--primary); margin-bottom: 8px;
    }
    .s-title { font-size: 22px; font-weight: 800; }
    .s-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }

    /* ── Genre cards ── */
    .genre-list { display: flex; flex-direction: column; gap: 12px; }
    .genre-card {
      background: var(--white); border: 2px solid transparent; border-radius: 16px;
      padding: 18px 18px; display: flex; align-items: center; gap: 16px;
      cursor: pointer; text-align: left;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      transition: border-color .15s, background .15s, transform .1s, box-shadow .15s;
    }
    .genre-card:hover { border-color: #c7d2fe; background: #f5f7ff; box-shadow: 0 4px 12px rgba(0,0,0,.09); }
    .genre-card:active { transform: scale(.97); }
    .g-emoji { font-size: 34px; }
    .g-name { font-size: 17px; font-weight: 700; }
    .g-desc { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── Progress ── */
    .prog-wrap { padding-top: 36px; margin-bottom: 32px; }
    .prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .prog-bar { width: 100%; height: 6px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .prog-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 99px; transition: width .35s cubic-bezier(.4,0,.2,1);
    }

    /* ── Question ── */
    .q-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--primary); margin-bottom: 10px; }
    .q-text { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 28px; }

    .choices { display: flex; flex-direction: column; gap: 12px; }
    .choice {
      background: var(--white); border: 2px solid transparent; border-radius: 16px;
      padding: 17px 20px; font-size: 16px; font-weight: 500; color: var(--text);
      cursor: pointer; text-align: left;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      transition: border-color .12s, background .12s, transform .1s;
    }
    .choice:hover { border-color: #c7d2fe; background: #f5f7ff; }
    .choice.picked {
      background: var(--primary); border-color: var(--primary);
      color: #fff; transform: scale(.98);
      box-shadow: 0 4px 14px rgba(99,102,241,.35);
    }

    /* ── Result ── */
    .book-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
    .book-card {
      background: var(--white); border-radius: 16px;
      padding: 18px; display: flex; gap: 14px; align-items: flex-start;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      cursor: pointer; text-decoration: none; color: inherit;
      border: 2px solid transparent;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      display: flex;
    }
    .book-card:hover { border-color: #f97316; box-shadow: 0 4px 16px rgba(249,115,22,.18); }
    .book-card:active { transform: scale(.97); }
    .rank {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg,#f59e0b,#fbbf24); }
    .rank-2 { background: linear-gradient(135deg,#9ca3af,#d1d5db); color: #444; }
    .rank-3 { background: linear-gradient(135deg,#92400e,#b45309); }
    .b-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
    .b-author { font-size: 13px; color: var(--primary); margin-top: 3px; }
    .b-desc { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
    .b-amazon {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 10px; font-size: 12px; font-weight: 700;
      color: #ea580c; background: #fff7ed;
      border: 1.5px solid #fdba74; border-radius: 8px;
      padding: 5px 10px;
    }
    .result-actions { display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP -->
  <div id="s-top" class="screen active">
    <div class="top-body">
      <div class="top-icon">📚</div>
      <h1 class="top-title">気分で本を診断</h1>

  </div>

  <!-- GENRE -->

      <div class="s-label">Step 1</div>

      <div class="s-desc">気になるジャンルを1つ選んでください</div>
    </div>
    <div class="genre-list">
      <button class="genre-card" onclick="startQuiz('novel')">
        <span class="g-emoji">📖</span>
        <div><div class="g-name">小説</div><div class="g-desc">感動・冒険・恋愛など</div></div>
      </button>
      <button class="genre-card" onclick="startQuiz('business')">

        <div><div class="g-name">ビジネス</div><div class="g-desc">仕事・お金・起業など</div></div>

      <button class="genre-card" onclick="startQuiz('self_help')">

        <div><div class="g-name">自己啓発</div><div class="g-desc">習慣・メンタル・成長など</div></div>

      <button class="genre-card" onclick="startQuiz('culture')">
        <span class="g-emoji">🌍</span>
        <div><div class="g-name">教養</div><div class="g-desc">歴史・科学・哲学など</div></div>
      </button>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div id="s-questions" class="screen">
    <div class="prog-wrap">
      <div class="prog-meta">
        <span id="p-count"></span>
        <span id="p-pct"></span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="p-fill"></div></div>
    </div>
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="screen">
    <div class="s-head">
      <div class="s-label" id="r-label"></div>
      <div class="s-title">あなたにおすすめの3冊</div>
      <div class="s-desc">今の気分にぴったりの本を選びました</div>
    </div>
    <div class="book-list" id="book-list"></div>
    <div class="result-actions">
      <button class="btn-main" onclick="go('genre')">もう一度診断する</button>
      <button class="btn-sub"  onclick="go('top')">トップへ戻る</button>
    </div>
  </div>

</div>

const GENRE_LABEL = { novel:"小説", business:"ビジネス", self_help:"自己啓発", culture:"教養" };

// ─── STATE ──────────────────────────────────────────────
let genre = null;
let qIndex = 0;
let tags = {};

// ─── NAVIGATION ─────────────────────────────────────────
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ─── QUIZ ────────────────────────────────────────────────
function startQuiz(g) {
  genre = g; qIndex = 0; tags = {};
  renderQ();
  go('questions');
}

function renderQ() {
  const qs = QS[genre];
  const q  = qs[qIndex];
  const total   = qs.length;
  const current = qIndex + 1;
  const pct     = Math.round(current / total * 100);

  document.getElementById('p-count').textContent = current + ' / ' + total;
  document.getElementById('p-pct').textContent   = pct + '%';
  document.getElementById('p-fill').style.width  = pct + '%';
  document.getElementById('q-num').textContent   = 'Q' + current;
  document.getElementById('q-text').textContent  = q.text;

  const wrap = document.getElementById('choices');
  wrap.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className   = 'choice';
    btn.textContent = c.label;
    btn.onclick = () => pick(i, btn);
    wrap.appendChild(btn);
  });
}

function pick(i, btn) {
  // lock buttons
  document.querySelectorAll('.choice').forEach(b => b.onclick = null);
  btn.classList.add('picked');

  const choiceTags = QS[genre][qIndex].choices[i].tags;
  for (const [tag, v] of Object.entries(choiceTags)) {
    tags[tag] = (tags[tag] || 0) + v;
  }

  setTimeout(() => {
    if (qIndex + 1 < QS[genre].length) {
      qIndex++;
      renderQ();
    } else {
      showResult();
    }
  }, 300);
}

// ─── SCORING ─────────────────────────────────────────────
function score(book) {
  let s = 0;
  for (const [tag, uv] of Object.entries(tags)) s += uv * (book.tags[tag] || 0);
  return s;
}

function showResult() {
  const top3 = BOOKS
    .filter(b => b.genre === genre)
    .map(b => ({ b, s: score(b) }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 3);

  document.getElementById('r-label').textContent = GENRE_LABEL[genre] + ' / 診断結果';

  const list = document.getElementById('book-list');
  list.innerHTML = '';
  const ranks = ['1st','2nd','3rd'];
  top3.forEach(({ b }, i) => {
    const url = 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(b.title + ' ' + b.author);
    const card = document.createElement('a');
    card.className = 'book-card';
    card.href = url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.innerHTML =
      `<div class="rank rank-${i+1}">${ranks[i]}</div>` +
      `<div>` +
        `<div class="b-title">${b.title}</div>` +
        `<div class="b-author">${b.author}</div>` +
        `<div class="b-desc">${b.description}</div>` +
        `<div class="b-amazon">🛒 Amazonで見る →</div>` +
      `</div>`;
    list.appendChild(card);
  });

  go('result');
}
